<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic‑Tac‑Toe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>Tic‑Tac‑Toe</h1>

        <!-- Player name input area -->
        <div class="player-setup">
            <div class="player-input">
                <label for="playerX">Player X name:</label>
                <input type="text" id="playerX" placeholder="Player X" value="Player X">
            </div>
            <div class="player-input">
                <label for="playerO">Player O name:</label>
                <input type="text" id="playerO" placeholder="Player O" value="Player O">
            </div>
            <button id="startBtn">Start / Restart</button>
        </div>

        <!-- Game board grid -->
        <div class="board" id="board">
            <!-- 9 cells will be generated by JavaScript -->
        </div>

        <!-- Game status message -->
        <div class="status" id="status">Player X's turn</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
